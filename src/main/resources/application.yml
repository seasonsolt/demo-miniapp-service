spring:
  application:
    name: demo-miniapp-service
  datasource:
    url: jdbc:h2:mem:demo_miniapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

server:
  port: 18082

demo-miniapp:
  session:
    token-ttl-seconds: 900
